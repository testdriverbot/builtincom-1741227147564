version: 4.2.12
session: 67c90cb9f83fdb2e1aab67e6
steps:
  - prompt: Focus the browser window.
    commands:
      - command: focus-application
        name: Google Chrome
  - prompt: Enter a job title in the search input field.
    commands:
      - command: hover-text
        text: Job Title or Keyword
        description: search input field for job title
        action: click
      - command: type
        text: Software Engineer
  - prompt: Click the "See Jobs" button.
    commands:
      - command: hover-text
        text: SEE JOBS
        description: button to search for jobs
        action: click
  - prompt: Assert that a list of job results is displayed.
    commands:
      - command: assert
        expect: a list of job results is displayed
